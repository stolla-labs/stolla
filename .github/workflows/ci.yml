name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt
      - name: Test contracts
        run: cd contracts && cargo test
      - name: Build contracts
        run: cd contracts && CARGO_TARGET_DIR=target stellar contract build

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Reject nested workspace lockfile
        run: |
          if [ -f apps/web/package-lock.json ]; then
            echo "Invalid npm workspace layout:"
            echo "- apps/web/package-lock.json must not exist. Install dependencies from the repository root."
            exit 1
          fi
      - name: Install dependencies
        run: npm ci
      - name: Validate workspace layout
        run: npm run check:workspace
      - name: Build frontend
        run: npm run build --workspace=web
        env:
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_STELLAR_RPC_URL: https://soroban-testnet.stellar.org
